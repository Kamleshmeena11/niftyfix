name: 📈 Nifty 1s Bar Collector

on:
  schedule:
    # 09:10 IST = 03:40 UTC — 5 min buffer before 09:15 market open
    - cron: "*/5 * * * *"   # fires every 5 min — TEMPORARY, for testing only
  workflow_dispatch:

jobs:
  collect:
    name: Collect Market Data
    runs-on: ubuntu-latest
    timeout-minutes: 375
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run collector
        env:
          FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
          FYERS_APP_TYPE: ${{ secrets.FYERS_APP_TYPE }}
          FYERS_SECRET_KEY: ${{ secrets.FYERS_SECRET_KEY }}
          FYERS_FY_ID: ${{ secrets.FYERS_FY_ID }}
          FYERS_TOTP_SECRET: ${{ secrets.FYERS_TOTP_SECRET }}
          FYERS_PIN: ${{ secrets.FYERS_PIN }}
          FYERS_REDIRECT_URI: ${{ secrets.FYERS_REDIRECT_URI }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python collector.py

      - name: 📁 Upload candles_1s.csv as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nifty-bars-${{ github.run_id }}
          path: candles_1s.csv
          retention-days: 30
